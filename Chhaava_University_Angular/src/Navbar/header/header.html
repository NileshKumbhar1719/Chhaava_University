<header class="site-header">
  <a class="brand" routerLink="/home">Chhaava University</a>
  <nav class="nav-menu">
    <a routerLink="/home">Home</a>
    <a routerLink="/login" *ngIf="!isLoggedIn">Login</a>
    <a routerLink="/register" *ngIf="!isLoggedIn">Register</a>
    <span *ngIf="isLoggedIn">Welcome, {{ username }}</span>
    <button type="button" (click)="logout()" *ngIf="isLoggedIn">Logout</button>
  </nav>
</header>
